<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">Drink Survey Form</h1>
    <p id="description">What kind of drinks you like?</p>
      <form id="survey-form">
        <label id="name-label">Name:</label>
        <input required id="name" type="text" placeholder="David"/>
        <label id="email-label">Email:</label>
        <input required id="email" type="email" placeholder="xxx@yahoo.com"/>
        <label id="number-label">Number:</label>
        <input id="number" type="number" min="2" max="30" placeholder="12"/>

        <select id="dropdown">
          <option>1</option> 
          <option>2</option> 
        </select>
        
        <input type="radio" name="tea" value="tea">
        <input type="radio" name="coffee" value="coffee">

        <input type="radio" name="tea" value="tea">
        <input type="radio" name="coffee" value="coffee">

        <input type="checkbox" value="aaa">
        <input type="checkbox" value="aaa">
        <input type="checkbox" value="aaa">
        <input type="checkbox" value="aaa">

        <input type="textarea">
        <textarea></textarea>

        <button id="submit">submit</button>


      </form>



  </body>
</html>
