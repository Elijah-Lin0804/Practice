        const year = 2024;

        const isLeapYear = (year) => {
            const leapYearOrNot = (year % 4 === 0 && year % 100 !== 0 || year % 400 === 0) ? `${year} is a leap year.` : `${year} is not a leap year.`;
            return leapYearOrNot;
        }
        const result = isLeapYear(year);
        console.log(result);
