//AI建議優化版本
let lunches = [];

const logAction = (msg) => console.log(msg);

const addLunchToEnd = (arr, item) => {
  arr.push(item);
  logAction(`${item} added to the end of the lunch menu.`);
  return arr;
}

const addLunchToStart = (arr, item) => {
  arr.unshift(item);
  logAction(`${item} added to the start of the lunch menu.`);
  return arr;
}

const removeLastLunch = (arr) => {
  if (!arr.length) {
    logAction(`No Lunches to remove.`);
    return arr;
  }
  const removeItem = arr.pop();
  logAction(`${removeItem} removed from the end of the lunch menu.`);
  return arr;
}

const removeFirstLunch = (arr) => {
  if(!arr.length) {
    logAction(`No lunches to remove.`);
    return arr;
  }
  const removeItem = arr.shift();
  logAction(`${removeItem} removed from the start of the lunch menu.`);
  return arr;
}

const getRandomLunch = (arr) => {
  if (!arr.length) {
    logAction(`No lunches available.`);
    return null;//明確回傳空白值
  }
  const randomIndex = Math.floor(Math.random() * arr.length);
  const result = arr[randomIndex];
  logAction(`Randomly selected lunch: ${result}`);
  return arr;//AI建議為return result 不知道有沒有差別
}

const showLunchMenu = (arr) => {
  if (!arr.length) {
    logAction(`The menu is empty.`);
    return;
  }
  logAction(`Menu items: ${arr.join(", ")}`);
  return arr;
}
