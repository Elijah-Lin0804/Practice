<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let result = "1" + 3;
        console.log(result);
        console.log(typeof result);

        result = 3 - "1";
        console.log(result);
        console.log(typeof result);

        result = '3' - 1;
        console.log(result);
        console.log(typeof result);

        result = "3" - "1";
        console.log(result);
        console.log(typeof result);

        result = '3' * 2;
        console.log(result);
        console.log(typeof result);

        result = '6' / 2;
        console.log(result);
        console.log(typeof result);

        result = '6' % 4;
        console.log(result);
        console.log(typeof result);
        
        result = 'a' + 4;
        console.log(result);
        console.log(typeof result);

        result = 'a' - 4;
        console.log(result);
        console.log(typeof result);

        result = 'a' * 4;
        console.log(result);
        console.log(typeof result);

        result = true + 4;
        console.log(result);
        console.log(typeof result);

        result = false + 4;
        console.log(result);
        console.log(typeof result);

        result = true + "4";
        console.log(result);
        console.log(typeof result);

        result = 4 / 0;
        console.log(result);
        console.log(typeof result);

        result = null + 1;
        console.log(result);
        console.log(typeof result);

        result = undefined + 1;
        console.log(result);
        console.log(typeof result);

        let x = 5;
        console.log(++x);//x+1再顯示
        console.log(x++);//先顯示X，再幫X+1
        console.log(x);
        console.log(--x);
        console.log(x--);
        console.log(x);

        console.log(2 ** 3 ** 2);//指數運算是從右到左，因此是512，不是64
        
        let a = 5;
        let b = ++a;
        console.log(b);//6

        let c = 5;
        let d = c++;
        console.log(d);//5

        const timmyAge = 15;
        if (timmyAge >= 18) {
            console.log("Timmy可以開車了");
        } else {
            console.log("Timmy還不能開車");
        }

        console.log(5 == "5");//true
        console.log(5 === "5");//false





    </script>
</body>
</html>
