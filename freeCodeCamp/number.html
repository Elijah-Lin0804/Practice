<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let result = "1" + 3;
        console.log(result);
        console.log(typeof result);

        result = 3 - "1";
        console.log(result);
        console.log(typeof result);

        result = '3' - 1;
        console.log(result);
        console.log(typeof result);

        result = "3" - "1";
        console.log(result);
        console.log(typeof result);

        result = '3' * 2;
        console.log(result);
        console.log(typeof result);

        result = '6' / 2;
        console.log(result);
        console.log(typeof result);

        result = '6' % 4;
        console.log(result);
        console.log(typeof result);
        
        result = 'a' + 4;
        console.log(result);
        console.log(typeof result);

        result = 'a' - 4;
        console.log(result);
        console.log(typeof result);

        result = 'a' * 4;
        console.log(result);
        console.log(typeof result);

        result = true + 4;
        console.log(result);
        console.log(typeof result);

        result = false + 4;
        console.log(result);
        console.log(typeof result);

        result = true + "4";
        console.log(result);
        console.log(typeof result);

        result = 4 / 0;
        console.log(result);
        console.log(typeof result);

        result = null + 1;
        console.log(result);
        console.log(typeof result);

        result = undefined + 1;
        console.log(result);
        console.log(typeof result);





    </script>
</body>
</html>
