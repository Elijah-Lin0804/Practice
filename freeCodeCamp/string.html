<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let greeting = "Hello";
        let name = "Elijah";
        let sentence = "How are you?";

        console.log(greeting + ", my name is " + name + ". " + sentence);
    
        name = "David";
        sentence = "Nice to meet you!"
        console.log(greeting + ", my name is " + name + ". " + sentence);

        console.log(typeof name);
        console.log(typeof 24);
        console.log(name.typeof);

        console.log(name[1], name[3]);

        console.log(name.length);
        console.log(sentence.length);
        console.log(sentence[0] + sentence[6]);
        console.log(sentence[sentence.length - 1]);

        let no = sentence[0] + sentence[6];
        let exclamation = sentence[sentence.length - 1];
        console.log(no + exclamation);

        console.log(sentence.indexOf("Nice"));
        console.log(sentence.indexOf("to"));
        console.log(sentence.indexOf("meet"));
        console.log(sentence.indexOf("you"));
        console.log(sentence.indexOf("nice"));

        console.log(name.indexOf("a"));
        
        console.log(sentence.includes("Nice"));
        console.log(sentence.includes("nice"));//大小寫敏感
        
        console.log(sentence.slice(8, 12));
        console.log(sentence.slice(-4));

        console.log(sentence.toUpperCase());
        console.log(sentence.toLowerCase());

        const trimPractice = "  this is trim practice.   ";
        console.log(trimPractice);
        console.log(trimPractice.trim());
        console.log(trimPractice.trimStart());
        console.log(trimPractice.trimEnd());
        console.log(trimPractice.trim().toUpperCase());
        const cleanedTrimPractice = trimPractice.trim(); 
        console.log(cleanedTrimPractice[0].toUpperCase() + cleanedTrimPractice.slice(-21));
        
        //以下是AI推薦的寫法：
        const result = cleanedTrimPractice.charAt(0).toUpperCase() + cleanedTrimPractice.slice(1);
        console.log(result);

        //2026.5.3
        const replacePractice = "I love dogs.";
        console.log(replacePractice);
        const replaceSentence = replacePractice.replace("dogs", "cats");
        console.log(replaceSentence);
        const repeatLove = "Love ".repeat(3);
        console.log(repeatLove);
        console.log(replaceSentence.slice(0,2) + repeatLove.toLowerCase() + replaceSentence.slice(-5));
         
        const statement = "I said \"Hello!\"";// \" Escaping Strings
        console.log(statement);

        const letter = "A";
        console.log(letter.charCodeAt(0));
        const char = String.fromCharCode(65);
        console.log(char);
        

    </script>
</body>
</html>
