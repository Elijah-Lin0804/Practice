        //arrow-function箭頭函式寫法
        //let 名稱=(參數)=>{};

        //如果內容只有回傳值，可以進一步簡化為
        //let 名稱=(參數)=>(回傳值);

        let calculate=(max)=>{
            let total=0;
            let n=1;
            while(n<=max){
                total+=n;
                n++;
            }
            console.log(total);
        }

        calculate(10);
        calculate(20);
