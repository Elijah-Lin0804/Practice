    <script>
        let checkMoney=(n)=>{
            if(n%100==0 && n>=100 && n<=100000){
                return true;
            }else{
                return false;
            }
           
        }

        console.log(checkMoney(30));
        console.log(checkMoney(2000));
        console.log(checkMoney(6150));

    </script>
