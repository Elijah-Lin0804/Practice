    <script>
        /*
        5. 找到最大公因數
        輸入兩個正整數，你的函式能找到並回傳這兩個正整數的最大公因數。

        輸入範例一：6 和 4
        回傳：2

        輸入範例二：5 和 16
        回傳：1

        輸入範例一：12 和 6
        回傳：6

        */
       
        let findGCD=(a, b)=>{
        while(b!==0){
            let n = a%b;
            a=b;
            b=n;
            }
        return a;
        }

        console.log(findGCD(6,4), findGCD(5,16), findGCD(12,6))
    </script>
