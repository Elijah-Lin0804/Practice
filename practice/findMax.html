<body>
    <script>
        let findMax=(n)=>{
            let max = n[0];
            for(let i=1 ; i<n.length ; i++){
                if(max < n[i]){
                    max = n[i];
                }
            }
        return max
        }
        console.log(findMax([1, 3, 3, 2, 5, -2]));
        console.log(findMax([-5, -10, -8, -1, -2]));
        console.log(findMax([0, 2, 2]));

    </script>
</body>
