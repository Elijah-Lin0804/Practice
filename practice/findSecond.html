<body>
    <script>
        /*
        4. 找到第二大的整數
        輸入包含至少兩個不同整數的陣列 / 列表，找到並回傳其中第二大的整數。

        輸入範例一：[1, 3, 3, 2, 5, -2]
        回傳：3

        輸入範例二：[-5, -10, -8, 1, -1]
        回傳：-1

        輸入範例一：[0, 2]
        回傳：0
        */

        let findSecond=(n)=>{
            let max = n[0];
            let second = n[1];
            if(max > second){
                max = n[0];
                second = n[1];
            }else{
                max = n[1];
                second = n[0];
            };

            for(let i = 2; i < n.length; i++ ){
              if(max < n[i]){
                second = max;
                max = n[i];                
              }else{
                if(second < n[i]){
                    second = n[i];
                }
              }
            };
            return second;
            
        }

        console.log(findSecond([1, 3, 3, 2, 5, -2]));
        console.log(findSecond([-5, -10, -8, 1, -1]));
        console.log(findSecond([1,10,20]));

        //還有出現重複數字的情況需要處理，用else if 和 && 增加一個條件即可

    </script>
</body>
