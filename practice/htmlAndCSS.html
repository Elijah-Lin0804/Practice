<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .title{
            background-color:red; 
            font-size: 60px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
            padding: 50px;
            text-align: center;
            margin-bottom: 30px;
            border: 10px dashed blue;
        }
        .frame{
            display: flex;
            background-color: #ccc;
        }
        .content-1{
            flex: none;
            width: 30%;
            background-color: blue;
            margin-bottom: 30px;
            border: 15px;
            
        }
        .content-2{
            flex: none;
            width: 70%;
            background-color:green;
            margin-bottom: 30px;
            padding: 15px;
        
        }
        .content-3{
            background-color:yellow;
            padding: 20px;
            border: 3px dashed black;
            
        }
    </style>
        
</head>

<body>
    <div class="title">這是標題</div> 
    <div class="frame">
        <div class="content-1">這是第一行</div>
        <div class="content-2">這是第二行</div>
        
    </div>
    <div class="content-3">這是第三行</div> 

</body>
</html>
