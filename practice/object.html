<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //基本寫法
        let man = new Object()
            man.name = "小明";
            man.Age = 18;
            man.Talk = function(){
                console.log("Hello");
            }
        
        console.log(man.name);


        //jSON物件表示法
        let woman = {
            name:"小美",//屬性
            Age:23,
            looks:"cool",
            Talk:function(){
                console.log("哈囉，我是",this.name,"我今年",this.Age,"歲");
            }
        };

        woman.Talk();

    </script>


</body>
</html>
